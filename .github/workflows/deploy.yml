# Deploy frontend on push to main: lint → test → Vercel build in CI → deploy prebuilt
# (API_URL from GitHub Actions only; Vercel does not rebuild, so no drift from empty Vercel env.)
name: Deploy frontend

on:
  push:
    branches: [main]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Install Chrome for tests
        uses: browser-actions/setup-chrome@v1

      - name: Test
        run: npm run test:ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Vercel build (production; bakes API_URL from GitHub)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          API_URL: ${{ secrets.API_URL }}

      - name: Vercel deploy (prebuilt; no remote rebuild)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
