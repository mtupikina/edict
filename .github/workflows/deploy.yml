# Deploy frontend on push to main: lint → test → build → deploy to Vercel
name: Deploy frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Install Chrome for tests
        uses: browser-actions/setup-chrome@v1

      - name: Test
        run: npm run test:ci

      - name: Build for production
        run: npm run build:prod
        env:
          API_URL: ${{ secrets.API_URL }}

      # Deploy only the Angular browser output. Skip Vercel's remote build (avoids
      # duplicating dashboard / vercel.json build settings and npm ci on Vercel).
      - name: Prepare Vercel static bundle
        run: jq '. + {"buildCommand": ""}' vercel.json > dist/edict/browser/vercel.json

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v42
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: dist/edict/browser
          vercel-args: '--prod'
          # v25 of this action pinned CLI 25.x; Vercel now requires ≥47.2.2 for deploy APIs.
          vercel-version: latest
