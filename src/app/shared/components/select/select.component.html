<button
  type="button"
  role="combobox"
  aria-controls="dropdown"
  [class]="triggerClasses()"
  [disabled]="zDisabled()"
  [attr.aria-expanded]="isOpen()"
  [attr.aria-haspopup]="'listbox'"
  [attr.data-placeholder]="!zValue() ? '' : null"
  (blur)="!isOpen() && isFocus.set(false)"
  (click)="toggle()"
  (focus)="onFocus()"
>
  <span class="flex min-w-0 flex-1 flex-wrap items-center gap-2">
    @for (label of selectedLabels(); track label) {
      @if (zMultiple()) {
        <z-badge zType="secondary">
          <span class="truncate">{{ label }}</span>
        </z-badge>
      } @else {
        <span class="truncate">{{ label }}</span>
      }
    } @empty {
      <span class="text-muted-foreground truncate">{{ zPlaceholder() }}</span>
    }
  </span>
  <z-icon zType="chevron-down" zSize="lg" class="opacity-50" />
</button>

<ng-template #dropdownTemplate>
  <div
    id="dropdown"
    [class]="contentClasses()"
    role="listbox"
    [attr.data-state]="'open'"
    (keydown)="onDropdownKeydown($event)"
    tabindex="-1"
  >
    @if (zFilterable()) {
      <div class="sticky top-0 z-10 border-b border-border bg-popover px-1.5 pb-2 pt-1.5">
        <input
          #filterInput
          type="search"
          autocomplete="off"
          [attr.aria-label]="zFilterPlaceholder()"
          [placeholder]="zFilterPlaceholder()"
          (input)="onFilterInput($event)"
          (keydown)="onFilterInputKeydown($event)"
          class="flex h-8 w-full rounded-md border border-input bg-transparent px-2 text-xs shadow-xs outline-none ring-offset-background placeholder:text-muted-foreground focus-visible:border-ring focus-visible:ring-[3px] focus-visible:ring-ring/50"
        />
      </div>
    }
    <div class="p-1">
      @if (zFilterable() && filterQuery().trim() && visibleItemsCount() === 0) {
        <div class="py-2 text-center text-xs text-muted-foreground">No matches</div>
      }
      <ng-content />
    </div>
  </div>
</ng-template>
