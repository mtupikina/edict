<div class="rounded-xl border border-slate-200 bg-white p-4 sm:p-6 shadow-sm h-full flex flex-col">
  <div class="mb-4">
    <h2 class="text-base font-semibold text-slate-800">Words by Part of Speech</h2>
    <p class="text-xs text-slate-500 mt-0.5">
      Distribution across {{ total() }} word{{ total() === 1 ? '' : 's' }}
    </p>
  </div>

  <div class="relative flex-1 min-h-56">
    @if (loading()) {
      <div class="absolute inset-0 flex items-center justify-center bg-white">
        <span class="text-sm text-slate-400">Loading…</span>
      </div>
    } @else if (error()) {
      <div class="absolute inset-0 flex items-center justify-center bg-white">
        <span class="text-sm text-red-500">{{ error() }}</span>
      </div>
    } @else if ((chartData().labels?.length ?? 0) === 0) {
      <div class="absolute inset-0 flex items-center justify-center bg-white">
        <span class="text-sm text-slate-400">No words yet</span>
      </div>
    }
    <canvas baseChart
      [data]="chartData()"
      [options]="chartOptions"
      type="doughnut"
    ></canvas>
  </div>
</div>
