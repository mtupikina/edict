<div class="rounded-xl border border-slate-200 bg-white p-4 sm:p-6 shadow-sm h-full flex flex-col">
  <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
    <div>
      <h2 class="text-base font-semibold text-slate-800">Quiz Frequency</h2>
      <p class="text-xs text-slate-500 mt-0.5">Days with at least one quiz per period</p>
    </div>
    <div class="flex items-center gap-2">
      <span class="text-xs text-slate-500">Group by</span>
      <div class="flex rounded-lg border border-slate-200 overflow-hidden text-xs">
        <button
          type="button"
          (click)="onGroupByChange('week')"
          [class.bg-teal-600]="groupBy() === 'week'"
          [class.text-white]="groupBy() === 'week'"
          [class.text-slate-600]="groupBy() !== 'week'"
          class="px-3 py-1.5 transition-colors"
        >
          Week
        </button>
        <button
          type="button"
          (click)="onGroupByChange('month')"
          [class.bg-teal-600]="groupBy() === 'month'"
          [class.text-white]="groupBy() === 'month'"
          [class.text-slate-600]="groupBy() !== 'month'"
          class="px-3 py-1.5 border-l border-slate-200 transition-colors"
        >
          Month
        </button>
      </div>
    </div>
  </div>

  <div class="relative flex-1 min-h-56">
    @if (loading()) {
      <div class="absolute inset-0 flex items-center justify-center bg-white">
        <span class="text-sm text-slate-400">Loading…</span>
      </div>
    } @else if (error()) {
      <div class="absolute inset-0 flex items-center justify-center bg-white">
        <span class="text-sm text-red-500">{{ error() }}</span>
      </div>
    } @else if ((chartData().labels?.length ?? 0) === 0) {
      <div class="absolute inset-0 flex items-center justify-center bg-white">
        <span class="text-sm text-slate-400">No quiz data yet</span>
      </div>
    }
    <canvas baseChart
      [data]="chartData()"
      [options]="chartOptions"
      type="bar"
    ></canvas>
  </div>
</div>
