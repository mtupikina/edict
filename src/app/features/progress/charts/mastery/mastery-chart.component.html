<div class="rounded-xl border border-slate-200 bg-white p-4 sm:p-6 shadow-sm">
  <div class="mb-4">
    <h2 class="text-base font-semibold text-slate-800">Translation Mastery</h2>
    <p class="text-xs text-slate-500 mt-0.5">
      % of quiz answers marked as known, by direction
    </p>
  </div>

  <div class="relative h-64 sm:h-72">
    @if (loading()) {
      <div class="absolute inset-0 flex items-center justify-center bg-white">
        <span class="text-sm text-slate-400">Loading…</span>
      </div>
    } @else if (error()) {
      <div class="absolute inset-0 flex items-center justify-center bg-white">
        <span class="text-sm text-red-500">{{ error() }}</span>
      </div>
    } @else if ((chartData().labels?.length ?? 0) === 0) {
      <div class="absolute inset-0 flex items-center justify-center bg-white">
        <span class="text-sm text-slate-400">No quiz data yet</span>
      </div>
    }
    <canvas baseChart
      [data]="chartData()"
      [options]="chartOptions"
      type="line"
    ></canvas>
  </div>
</div>
